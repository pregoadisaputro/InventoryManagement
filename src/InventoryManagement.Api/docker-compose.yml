services:
    api:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: inventory_management_api
        ports:
            - "${PORT:-8080}:8080"
        environment:
            - ASPNETCORE_ENVIRONMENT=Production
            - Jwt__Key=${Jwt__Key}
            - ConnectionStrings__Default=${ConnectionStrings__Default}
        restart: unless-stopped
